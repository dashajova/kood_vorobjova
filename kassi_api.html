<!DOCTYPE html>
<html lang en>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Kassi API rakendus</title>

        <style>

body {
    font-family: Cambria, Cochin, Georgia, Times, 'Times New Roman', serif;
    text-align: center;
    margin: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: #f1ceda;
}

#catImage {
    max-width: 100%;
    height: 600px; 
    border: 2px solid #ddd;
    border-radius: 8px;
    margin-bottom: 20px;
    object-fit: cover;
}

#newCatButton {
    padding: 10px 20px;
    font-size: 16px;
    cursor: pointer;
    background-color: #ca3164;
    color: white;
    border: none;
    border-radius: 4px;
    margin-top: 20px;
}
h1 {
    color: #ca3164;
}



            
            


        </style>
    </head>
    <body>
        <h1>Tere tulemast Kassi Api rakendusse!</h1>

        <img id="catImage" src="" alt="randomCat">

        <button id="newCatButton" onclick="getRandomCat()">Genereeri uus kassipilt</button>

        <script>
            function getRandomCat(){
                fetch('https://api.thecatapi.com/v1/images/search')
            .then(response => response.json())
            .then(data => {
                document.getElementById('catImage').src = data[0].url;
            })
            .catch(error => console.error('Viga kassi API päringus:', error));
    }
            
            getRandomCat();



        </script>




       
    </body>
</html>
