<!DOCTYPE html>
<html lang en>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Vormi valideerimine</title>
        <style>

            .container{
    position: absolute;
    width: 50%;
    min-width: 58px;
    transform: translate(-50%, -50%);
    top: 50%;
    left: 50%;
    background-color:#eceaea;
    padding: 100px 0px;
    display: grid;
    justify-items: center;
    font-family: 'Poppins', sans-serif;
    border-radius: 5px;
            }

            .h3{
    font-size: 60px;
    font-weight: 600;

}

   
button{
    position: absolute;
    width: 100px;
    padding: 10px 0;
    border-radius: 5px;
    background-color: #3f3a5e;
    color: #ffffff;
    font-size: 13px;
    font-weight: 600; 
    

}


    
        </style>
    </head>
    <body>
        <div class="container">
            <h3> Logi sisse</h3>
             <form id="myForm">
            <input type="text" id="kasutajanimi" placeholder="Kasutajanimi"><br>
            <input type="text" id="ePost" placeholder="E-post"><br>
            <input type="text" id="parool" placeholder="Parool"><br>
            <input type="text" id="parooliKinnitus" placeholder="Parooli kinnitamine"><br>
        
            <button type="button" onclick="checkForm()">Sisene</button>
        </form>
        </div>

        <script>
            function checkForm() {
                const Kasutajanimi = document.getElementById('kasutajanimi').value;
            const ePost = document.getElementById('ePost').value;
            const parool = document.getElementById('parool').value;
            const parooliKinnitus = document.getElementById('parool').value;
            const ePostPattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
    


            ///Nõutavate väljade kontroll///

            if(Kasutajanimi === '' || ePost === '' || parool === '' || parooliKinnitus === ''){
                alert('Palun täidke kõik lüngad');
            }
            else {
                console.log('Kõik lüngad täidetud edukalt');
            }

            ///Salasõna pikkuse kontroll//

            if(parool.lenght < 8) {
                alert('Parool peaks olema vähemalt 8 tähemärki pikk');
            }
            else {
                console.log('Parool on piisavalt pikk');
            }

            ///Kasutajanime pikkuse kontroll///
            if(Kasutajanimi.lenght < 5) {
                alert('Kasutajanimi on liiga lühike');
            }
            else {
                console.log('Sobiv kasutajanimi');
            }

            ///e-posti vastamine õigele formaadile///
            if(!ePost.match(ePostPattern)) {
                alert('Palun sisesta sobiv e-posti address');
            }
            else {
                console.log('Sobiv e-posti address');
            }

            ///parooli kontroll///

            if(!parool.match(parooliKinnitus)) {
                alert('Paroolid ei vasta omavahel');
            }
            else{
                console.log('Paroolid vastavad omavahel')
            }



            }
           





        </script>
       
    </body>
</html>
